version: 2

updates:
  - package-ecosystem: maven
    directory: /traffic-state-service
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      spring:
        patterns:
          - 'org.springframework*'
      maven-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: maven
    directory: /routing-service
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      spring:
        patterns:
          - 'org.springframework*'
      maven-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      # deck.gl publica os pacotes @deck.gl/* em lockstep — separar vira PR quebrado.
      deckgl:
        patterns:
          - '@deck.gl/*'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      npm-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      actions:
        patterns:
          - '*'
