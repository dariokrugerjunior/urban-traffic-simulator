spring:
  application:
    name: traffic-state-service

  # Local MVP profile uses an in-memory H2 database.
  datasource:
    url: jdbc:h2:mem:traffic;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  h2:
    console:
      enabled: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: traffic-state-service
      auto-offset-reset: earliest

server:
  port: 8081
